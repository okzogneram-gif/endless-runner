<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ENDLESS RUN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="https://portal-9bj.pages.dev" class="crest-back-btn" title="THE CREST に戻る" aria-label="THE CREST に戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
  </a>
  <div id="game-container">
  <div id="character-select">
    <h2>キャラクターを選んでください</h2>
    <div class="char-list">

      <div class="char-card selected" data-id="0">
        <div class="char-name">ケンジ</div>
        <div class="char-desc">男性・登山家</div>
      </div>

      <div class="char-card" data-id="1">
        <div class="char-name">アヤカ</div>
        <div class="char-desc">女性・バレリーナ</div>
      </div>

      <div class="char-card" data-id="2">
        <div class="char-name">タロウ</div>
        <div class="char-desc">男性・サムライ</div>
      </div>

      <div class="char-card" data-id="3">
        <div class="char-name">ミク</div>
        <div class="char-desc">女性・カウガール</div>
      </div>

      <div class="char-card" data-id="4">
        <div class="char-name">リョウ</div>
        <div class="char-desc">男性・騎士</div>
      </div>

    </div>
    <button id="char-start-btn">ゲームスタート</button>
  </div>
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="hud-left">
        <div id="score">0 m</div>
        <div id="coins">COINS 0</div>
      </div>
      <div class="hud-right">
        <div id="best">BEST 0 m</div>
        <button id="mute-btn" class="mute-btn">SOUND ON</button>
      </div>
    </div>

   <div id="start-screen" class="overlay hidden">
      <h1>ENDLESS RUN</h1>
      <p>タップ / スペースキーでジャンプ、下矢印/スワイプでダック<br>障害物を避けてコインを集め、できるだけ遠くまで走ろう</p>
      <button id="start-btn">START</button>
    </div>

    <div id="gameover-screen" class="overlay hidden">
      <h1>GAME OVER</h1>
      <p id="final-score">0 m</p>
      <p id="new-best" class="hidden">NEW BEST!</p>
      <button id="revive-btn" class="revive-btn hidden">
        <span class="revive-btn-title">その場で復活</span>
        <span class="revive-btn-price" id="revive-price">¥120</span>
      </button>
      <button id="restart-btn">RETRY</button>
      <p class="mock-payment-note">※ 疑似課金です。実際の請求は発生しません</p>
    </div>

    <div id="revive-processing" class="overlay hidden">
      <div class="revive-spinner"></div>
      <p id="revive-status-text">決済処理中…</p>
    </div>

    <div id="touch-controls" class="hidden">
      <button id="btn-duck" class="touch-btn touch-btn-duck" aria-label="しゃがむ">
        <span>DUCK</span>
      </button>
      <button id="btn-jump" class="touch-btn touch-btn-jump" aria-label="ジャンプ">
        <span>JUMP</span>
      </button>
    </div>
  </div>

<script src="game.js"></script>
</body>
</html>
